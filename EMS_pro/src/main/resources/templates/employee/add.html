<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Employee</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 450px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        .card-header {
            background-color: #0d6efd;
            color: white;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .btn-custom {
            width: 100%;
        }

        .form-control {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        ➕ Add New Employee
    </div>

    <div class="card-body">

        <form th:action="@{/employee/save}" 
              th:object="${employee}" 
              method="post">

            <!-- First Name -->
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text"
                       th:field="*{firstName}"
                       class="form-control"
                       placeholder="Enter First Name"
                       required>
            </div>

            <!-- Last Name -->
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text"
                       th:field="*{lastName}"
                       class="form-control"
                       placeholder="Enter Last Name"
                       required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email"
                       th:field="*{email}"
                       class="form-control"
                       placeholder="Enter Email"
                       required>
            </div>

            <!-- Buttons -->
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success btn-custom">
                    💾 Save Employee
                </button>

                <a th:href="@{/employee/list}" class="btn btn-secondary btn-custom">
                    🔙 Back to List
                </a>
            </div>

        </form>

    </div>
</div>

</body>
</html>
