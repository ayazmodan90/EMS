<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EMS Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #2c3e50;
            padding: 15px;
            color: white;
            font-size: 20px;
        }

        .container {
            padding: 30px;
        }

        .card {
            display: inline-block;
            background: white;
            padding: 20px;
            margin: 10px;
            width: 220px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin: 10px 0;
            font-size: 28px;
            color: #27ae60;
        }

        .btn {
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 5px;
            display: inline-block;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
        }

        table, th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

    </style>
</head>
<body>

<div class="navbar">
    Employee Management System - Dashboard
</div>

<div class="container">

    <h2 th:text="'Welcome, ' + ${name}"></h2>

    <!-- Summary Cards -->
    <div class="card">
        <h4>Total Employees</h4>
        <h3 th:text="${employeeCount}"></h3>
    </div>

    <!-- Action Buttons -->
    <div>
        <a href="/register" class="btn">Add Employee</a>
        <a href="/showRecords" class="btn">View All Employees</a>
        <a href="/login" class="btn">Logout</a>
    </div>

    <!-- Employee Table -->
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
        </tr>

        <tr th:each="emp : ${listEmployees}">
            <td th:text="${emp.id}"></td>
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.email}"></td>
        </tr>
    </table>

</div>

</body>
</html>
