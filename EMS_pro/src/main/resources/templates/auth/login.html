<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 380px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background: white;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 10px;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="text-center mb-4">Login</h3>

    <!-- Error Message -->
    <div th:if="${param.error}" class="alert alert-danger">
        Invalid email or password!
    </div>

    <!-- Logout Message -->
    <div th:if="${param.logout}" class="alert alert-success">
        You have been logged out successfully.
    </div>

   <form th:action="@{/login}" th:object="${user}" method="post">

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="username" class="form-control" placeholder="Enter email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-custom">Login</button>

        <div class="text-center mt-3">
            <a th:href="@{/register}">Don't have an account? Register</a>
        </div>

    </form>
</div>

</body>
</html>
