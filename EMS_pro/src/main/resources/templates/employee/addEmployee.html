<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Employee</title>
</head>
<body>

<h2 th:text="${employee.id == null} ? 'Add Employee' : 'Update Employee'"></h2>

<form th:action="@{/saveEmployee}" th:object="${employee}" method="post">

<input type="hidden" th:field="*{id}" />

First Name:
<input type="text" th:field="*{firstName}" required><br><br>

Last Name:
<input type="text" th:field="*{lastName}" required><br><br>

Email:
<input type="email" th:field="*{email}" required><br><br>

<button type="submit">Save</button>

</form>

<br>
<a th:href="@{/showRecords}">Back to List</a>

</body>
</html>
