<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Employee Data Table</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script
src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.js"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.css">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.header{
    background:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.header h2{
    margin:0;
    color:#2a5298;
}

.add-btn{
    padding:8px 15px;
    background:#2a5298;
    color:white;
    text-decoration:none;
    border-radius:5px;
    transition:0.3s;
}

.add-btn:hover{
    background:#1e3c72;
}

.container{
    margin:40px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

table.dataTable thead{
    background:#2a5298;
    color:white;
}

.edit-link{
    color:#2a5298;
    font-weight:bold;
    text-decoration:none;
}

.edit-link:hover{
    text-decoration:underline;
}

.delete-link{
    color:red;
    font-weight:bold;
    text-decoration:none;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
    <h2>Employee Management</h2>
    <a class="add-btn" th:href="@{/addEmployee}">+ Add New Employee</a>
</div>

<div class="container">

<table id="employeeTable" class="display">
<thead>
<tr>
<th>ID</th>
<th>First Name</th>
<th>Last Name</th>
<th>Email</th>
<th>Action</th>
</tr>
</thead>

<tbody>
<tr th:each="emp : ${listEmployees}">
<td th:text="${emp.id}"></td>
<td th:text="${emp.firstName}"></td>
<td th:text="${emp.lastName}"></td>
<td th:text="${emp.email}"></td>
<td>
<a class="edit-link" th:href="@{/showFormForUpdate/{id}(id=${emp.id})}">Edit</a> |
<a class="delete-link" href="#" th:onclick="|confirmDelete(${emp.id})|">Delete</a>
</td>
</tr>
</tbody>
</table>

</div>

<script>
$(document).ready(function () {
    $('#employeeTable').DataTable();
});

function confirmDelete(id){
Swal.fire({
title: "Are you sure?",
text: "You won't be able to revert this!",
icon: "warning",
showCancelButton: true,
confirmButtonColor: "#3085d6",
cancelButtonColor: "#d33",
confirmButtonText: "Yes, delete it!"
}).then((result) => {
if (result.isConfirmed) {
window.location.href = "/deleteEmployee/" + id;
}
});
}
</script>

</body>
</html>
